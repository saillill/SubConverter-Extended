name: Auto Sync Upstream

on:
  push:
    paths:
      - '.github/workflows/auto-sync-upstream.yml'
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: "Sync from upstream"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Aethersailor/SubConverter-Extended.git
          git fetch upstream master

      - name: Check for updates
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master || echo "0")
          echo "commits_behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Found $BEHIND new commits from upstream"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Merge upstream
        if: steps.check.outputs.has_updates == 'true'
        id: merge
        continue-on-error: true
        run: |
          git merge upstream/master --no-edit
          echo "merge_success=true" >> $GITHUB_OUTPUT

      - name: Apply fork patches (fix hardcoded upstream URLs)
        if: steps.merge.outputs.merge_success == 'true'
        id: patch
        run: |
          # 1. 把硬编码的默认配置地址从 Aethersailor 改为 saillill (settings.cpp)
          sed -i 's|https://gcore.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@refs/heads/main/cfg/Custom_Clash.ini|https://raw.githubusercontent.com/saillill/Custom_OpenClash_Rules@refs/heads/main/cfg/Custom_Clash.ini|g' src/handler/settings.cpp

          # 2. 修复 pref.example.toml 的默认配置地址
          sed -i 's|https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@refs/heads/main/cfg/Custom_Clash.ini|https://raw.githubusercontent.com/saillill/Custom_OpenClash_Rules@refs/heads/main/cfg/Custom_Clash.ini|g' base/pref.example.toml

          # 3. 注释掉 snippets/groups.toml 的引入，防止注入上游策略组
          sed -i 's|^import = "snippets/groups.toml"|#import = "snippets/groups.toml"|' base/pref.example.toml

          # 4. 用 fork 的 Custom_Clash.ini 替换内置回退文件
          curl -fsSL -o base/Custom_OpenClash_Rules/main/cfg/Custom_Clash.ini \
            "https://raw.githubusercontent.com/saillill/Custom_OpenClash_Rules/main/cfg/Custom_Clash.ini"

          # 5. 检查是否有改动，有就提交
          if git diff --quiet; then
            echo "no_patch_needed=true" >> $GITHUB_OUTPUT
          else
            echo "no_patch_needed=false" >> $GITHUB_OUTPUT
            git add src/handler/settings.cpp base/pref.example.toml base/Custom_OpenClash_Rules/main/cfg/Custom_Clash.ini
            git commit -m "fix(upstream-sync): re-apply fork-specific patches (config URL + bundled ini + pref.toml)"
          fi

      - name: Push to origin
        if: steps.merge.outputs.merge_success == 'true'
        run: |
          git push origin master

      - name: Create conflict issue
        if: steps.check.outputs.has_updates == 'true' && steps.merge.outputs.merge_success != 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['upstream-sync-conflict'],
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '⚠️ 上游同步冲突 - 需要手动处理',
                body: `上游 Aethersailor/SubConverter-Extended 有新的更新，但自动合并时发生冲突。\n\n### 手动处理步骤：\n1. 在本地拉取最新代码：\`git pull origin master\`\n2. 合并上游：\`git fetch upstream && git merge upstream/master\`\n3. 解决冲突文件\n4. 推送：\`git push origin master\`\n\n> 🤖 此 Issue 由 Auto Sync Upstream Action 自动创建`,
                labels: ['upstream-sync-conflict'],
              });
            }
