name: Build Docker Image (Fork)

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'README.md'
      - 'docker-compose.yml'
      - '.github/workflows/auto-sync-upstream.yml'
  workflow_dispatch: {}

permissions:
  packages: write
  contents: read

jobs:
  build:
    name: "Build and Push to ghcr.io"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.debian
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/subconverter-extended:latest
            ghcr.io/${{ github.repository_owner }}/subconverter-extended:master
          build-args: |
            THREADS=4
            VERSION=latest
          platforms: linux/amd64
