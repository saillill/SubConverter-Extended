name: Build and Push Docker image (fork)

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch: {}

permissions:
  packages: write

concurrency:
  group: docker-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: "Docker Build (amd64)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/subconverter-extended:latest
            ghcr.io/${{ github.repository_owner }}/subconverter-extended:${{ steps.meta.outputs.sha_short }}
          build-args: |
            THREADS=4
            SHA=${{ steps.meta.outputs.sha_short }}
            VERSION=${{ steps.meta.outputs.sha_short }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            MIHOMO_REF=Meta
